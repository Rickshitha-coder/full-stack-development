<!DOCTYPE html>
<html>
<head>
    <title>Sleep Club</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fff3cd;
            padding: 50px;
        }

        h1 {
            color: #ff9800;
        }

        p {
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e68900;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Sleep Club 😴</h1>

    <p>
        Our mission is simple: Sleep, Wake Up, Eat, and Sleep Again!
    </p>

    <button onclick="showMessage()">Secret Tip</button>

    <script>
        function showMessage() {
            alert("Congratulations! You are now the CEO of Napping 😂");
        }
    </script>

</body>
</html>
